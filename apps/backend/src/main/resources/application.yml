spring:
  application:
    name: platform-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/platform_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:platform_user}
    password: ${SPRING_DATASOURCE_PASSWORD:platform_pass}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  tenant:
    header-name: ${APP_TENANT_HEADER:X-Tenant-Id}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:ZmFrZV9qd3Rfc2VjcmV0X2Zvcl9kZXZlbG9wbWVudF9vbmx5XzEyMzQ1}
      access-minutes: ${APP_SECURITY_JWT_ACCESS_MINUTES:15}
      refresh-days: ${APP_SECURITY_JWT_REFRESH_DAYS:7}
      issuer: ${APP_SECURITY_JWT_ISSUER:platform-api}
