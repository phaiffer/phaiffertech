name: phaiffertech

services:
  mysql:
    image: mysql:8.0
    container_name: platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-platform_db}
      MYSQL_USER: ${MYSQL_USER:-platform_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-platform_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - platform-net

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: platform-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-platform_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-platform_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-platform_pass}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:-ZmFrZV9qd3Rfc2VjcmV0X2Zvcl9kZXZlbG9wbWVudF9vbmx5XzEyMzQ1}
      APP_SECURITY_JWT_ACCESS_MINUTES: ${APP_SECURITY_JWT_ACCESS_MINUTES:-15}
      APP_SECURITY_JWT_REFRESH_DAYS: ${APP_SECURITY_JWT_REFRESH_DAYS:-7}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_TENANT_HEADER: ${APP_TENANT_HEADER:-X-Tenant-Id}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - platform-net

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: platform-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - platform-net

  adminer:
    image: adminer:4.8.1
    container_name: platform-adminer
    restart: unless-stopped
    profiles:
      - tools
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - platform-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: platform-prometheus
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/docker/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - platform-net

  loki:
    image: grafana/loki:3.2.1
    container_name: platform-loki
    profiles:
      - observability
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/docker/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    networks:
      - platform-net

  grafana:
    image: grafana/grafana:11.2.2
    container_name: platform-grafana
    profiles:
      - observability
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - platform-net

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:

networks:
  platform-net:
